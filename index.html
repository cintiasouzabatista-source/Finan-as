<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BankDay</title>

    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon-192x192.png">
    <link rel="icon" href="./favicon.png" type="image/png">
    <link rel="icon" href="data:,">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<!-- TELA PIN -->
<div id="tela-pin" class="tela-full">
    <div class="pin-box">
        <div class="pin-icon">
            <i class="fas fa-lock"></i>
        </div>

        <h2>Digite seu PIN</h2>

        <div id="form-pin">
            <div class="pin-inputs">
                <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" autocomplete="off">
                <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" autocomplete="off">
                <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" autocomplete="off">
                <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" autocomplete="off">
            </div>

            <p id="pin-erro" class="hidden"></p>

            <button onclick="resetarApp()">
                Esqueceu o PIN?
            </button>
        </div>
    </div>
</div>

<!-- ONBOARDING -->
<div id="modal-onboarding" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Bem-vindo ao BankDay</h3>
            <p>Como quer começar?</p>
        </div>

        <div class="modal-body">
            <button onclick="selecionarModo('teste')" class="btn-onboard">
                <i class="fas fa-flask"></i>
                <div>
                    <p>Testar por 48h</p>
                    <span>Explore sem compromisso</span>
                </div>
            </button>

            <button onclick="selecionarModo('producao')" class="btn-onboard">
                <i class="fas fa-check-circle"></i>
                <div>
                    <p>Usar pra valer</p>
                    <span>Cadastre suas contas reais</span>
                </div>
            </button>
        </div>
    </div>
</div>

<!-- APP -->
<div id="app-content" style="display:none;">

    <header>
        <div class="header-top">
            <h1>BankDay</h1>

            <div class="header-actions">
                <button onclick="toggleTheme()">
                    <i id="theme-icon" class="fas fa-moon"></i>
                </button>

                <button onclick="toggleVisibility()">
                    <i id="eye-icon" class="fas fa-eye"></i>
                </button>
            </div>
        </div>

        <div class="mes-nav">
            <button onclick="mudarMes(-1)">
                <i class="fas fa-chevron-left"></i>
            </button>

            <h2 id="mesAtual"></h2>

            <button onclick="mudarMes(1)">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>

        <!-- CARDS -->
        <div class="cards-grid">
            <div onclick="abrirExtrato('entrada')" class="card-item">
                <p>ENTRADAS</p>
                <p id="card-entradas" class="val text-emerald">R$ 0,00</p>
            </div>

            <div onclick="abrirExtrato('saida')" class="card-item">
                <p>SAÍDAS</p>
                <p id="card-saidas" class="val text-orange">R$ 0,00</p>
            </div>

            <div onclick="abrirExtrato('saldo')" class="card-item">
                <p>SALDO</p>
                <p id="card-saldo" class="val text-blue">R$ 0,00</p>
            </div>

            <div onclick="abrirExtrato('cartao')" class="card-item">
                <p>FATURA</p>
                <p id="card-cartoes" class="val text-rose">R$ 0,00</p>
            </div>

            <div onclick="abrirExtrato('liquido')" class="card-liquido">
                <p>LÍQUIDO</p>
                <p id="card-liquido" class="val big">R$ 0,00</p>
            </div>
        </div>
    </header>

    <main id="chat-box"></main>

    <footer class="chat-footer">
        <button onclick="iniciarVoz()" class="btn-mic" title="Falar">
            <i class="fas fa-microphone"></i>
        </button>

        <input
            id="user-input"
            type="text"
            placeholder="Ex: cafe 15 | recebi 500 | saldo inicial 1000"
        >

        <button id="btn-enviar">
            <i class="fas fa-paper-plane"></i>
        </button>
    </footer>

    <!-- MENU INFERIOR -->
    <nav class="nav">

        <button class="nav-item active" onclick="trocarAba('chat', event)">
            <i class="fas fa-comment-dots"></i>
            <span>Chat</span>
        </button>

        <button class="nav-item" onclick="abrirExtrato()">
            <i class="fas fa-list"></i>
            <span>Extrato</span>
        </button>

        <button class="nav-item" onclick="abrirGraficos(); trocarGrafico('categoria', event)">
            <i class="fas fa-chart-bar"></i>
            <span>Gráficos</span>
        </button>

        <button class="nav-item" onclick="abrirMenuMais(event)">
            <i class="fas fa-ellipsis-h"></i>
            <span>Mais</span>
        </button>

    </nav>
</div>

<!-- MENU MAIS -->
<div id="menu-mais" class="menu-mais hidden">
    <div class="menu-mais-content">

        <button onclick="abrirModalConta(); fecharMenuMais()">
            <i class="fas fa-university"></i>
            <span>Contas</span>
        </button>

        <button onclick="abrirModalCartao(); fecharMenuMais()">
            <i class="fas fa-credit-card"></i>
            <span>Cartões</span>
        </button>

        <button onclick="toggleProjetado(); fecharMenuMais()">
            <i class="fas fa-chart-line"></i>
            <span>Projeção</span>
        </button>

        <button onclick="resetarTransacoes(); fecharMenuMais()">
            <i class="fas fa-eraser"></i>
            <span>Limpar Mês</span>
        </button>

        <button onclick="resetarApp()">
            <i class="fas fa-trash"></i>
            <span>Resetar App</span>
        </button>

    </div>
</div>

<!-- ERROS -->
<script>
window.onerror = function(msg, src, line, col) {
    alert(
        'ERRO:\n' +
        msg + '\n' +
        'Linha: ' + line + '\n' +
        'Coluna: ' + col
    );
};
</script>

<!-- SERVICE WORKER -->
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('SW registrado:', reg))
            .catch(err => console.log('SW erro:', err));
    });
}
</script>

<script src="script.js"></script>

</body>
</html>
