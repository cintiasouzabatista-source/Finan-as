<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BankDay</title>
    <meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="./manifest.json" crossorigin="use-credentials">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./icon-192x192.png">
    <link rel="icon" href="/favicon.png" type="image/png">
</head>
<body class="dark">

<!-- TELA PIN -->
<div id="tela-pin" class="tela-full">
    <div class="pin-box">
        <div class="pin-icon"><i class="fas fa-lock"></i></div>
        <h2>Digite seu PIN</h2>
        <div id="form-pin">
            <div class="pin-inputs">
                <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" autocomplete="off">
                <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" autocomplete="off">
                <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" autocomplete="off">
                <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" autocomplete="off">
            </div>
        <p id="pin-erro" class="hidden"></p>
        <button onclick="resetarApp()">Esqueceu o PIN?</button>
    </div>
</div>

<!-- ONBOARDING -->
<div id="modal-onboarding" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Bem-vindo ao BankDay</h3>
            <p>Como quer começar?</p>
        </div>
        <div class="modal-body">
            <button onclick="selecionarModo('teste')" class="btn-onboard">
                <i class="fas fa-flask"></i>
                <div><p>Testar por 48h</p><span>Explore sem compromisso</span></div>
            </button>
            <button onclick="selecionarModo('producao')" class="btn-onboard">
                <i class="fas fa-check-circle"></i>
                <div><p>Usar pra valer</p><span>Cadastre suas contas reais</span></div>
            </button>
        </div>
    </div>
</div>

<!-- APP -->
<div id="app-content" style="display:none;">
    <header>
        <div class="header-top">
            <h1>BankDay</h1>
            <div class="header-actions">
                <button onclick="toggleTheme()"><i id="theme-icon" class="fas fa-moon"></i></button>
                <button onclick="toggleVisibility()"><i id="eye-icon" class="fas fa-eye"></i></button>
            </div>
        </div>

        <div class="mes-nav">
            <button onclick="mudarMes(-1)"><i class="fas fa-chevron-left"></i></button>
            <h2 id="mesAtual"></h2>
            <button onclick="mudarMes(1)"><i class="fas fa-chevron-right"></i></button>
        </div>

        <div class="cards-grid">
            <div onclick="abrirExtrato('entrada')" class="card-item">
                <p>ENTRADAS</p><p id="card-entradas" class="val text-emerald">R$ 0,00</p>
            </div>
            <div onclick="abrirExtrato('saida')" class="card-item">
                <p>SAÍDAS</p><p id="card-saidas" class="val text-orange">R$ 0,00</p>
            </div>
            <div onclick="abrirExtrato('saldo')" class="card-item">
                <p>SALDO</p><p id="card-saldo" class="val text-blue">R$ 0,00</p>
            </div>
            <div onclick="abrirExtrato('cartao')" class="card-item">
                <p>FATURA</p><p id="card-cartoes" class="val text-rose">R$ 0,00</p>
            </div>
            <div onclick="abrirExtrato('liquido')" class="card-liquido">
                <p>LÍQUIDO</p><p id="card-liquido" class="val big">R$ 0,00</p>
            </div>
        </div>
    </header>

    <main id="chat-box"></main>

    <footer class="chat-footer">
        <button onclick="iniciarVoz()" class="btn-mic" title="Falar"><i class="fas fa-microphone"></i></button>
        <input id="user-input" type="text" placeholder="Ex: cafe 15 | recebi 500 | saldo inicial 1000">
        <button id="btn-enviar"><i class="fas fa-paper-plane"></i></button>
    </footer>

    <nav class="nav">
        <button class="nav-item active" onclick="trocarAba('chat', event)">
            <i class="fas fa-comment-dots"></i><span>Chat</span>
        </button>
<button class="nav-item" onclick="abrirExtrato()">
    <i class="fas fa-list"></i>
    <span>Extrato</span>
</button>

<button class="nav-item" onclick="abrirGraficos(); trocarGrafico('categoria', event)">
    <i class="fas fa-chart-bar"></i>
    <span>Gráficos</span>
</button>
        
        <button class="nav-item" onclick="abrirMenuMais(event)">
            <i class="fas fa-ellipsis-h"></i><span>Mais</span>
        </button>
    </nav>
</div>

<!-- MENU MAIS - ÚNICO MENU -->
<div id="menu-mais" class="menu-mais hidden">
    <div class="menu-mais-content">
        <button onclick="abrirModalConta(); fecharMenuMais()">
            <i class="fas fa-university"></i>
            <span>Contas</span>
        </button>
        <button onclick="abrirModalCartao(); fecharMenuMais()">
            <i class="fas fa-credit-card"></i>
            <span>Cartões</span>
        </button>
        <button onclick="toggleProjetado(); fecharMenuMais()">
            <i class="fas fa-chart-line"></i>
            <span>Projeção</span>
        </button>
        <button onclick="resetarTransacoes(); fecharMenuMais()">
            <i class="fas fa-eraser"></i>
            <span>Limpar Mês</span>
        </button>
        <button onclick="resetarApp()">
            <i class="fas fa-trash"></i>
            <span>Resetar App</span>
        </button>
    </div>
</div>

<!-- MODAIS -->
<div id="modal-extrato" class="modal">
    <div class="modal-content full">
        <div class="modal-head"><h3>Extrato</h3><button onclick="fecharModal('modal-extrato')"><i class="fas fa-times"></i></button></div>
        <div class="modal-filters">
            <select id="filtro-tipo" onchange="filtrarExtrato()"><option value="">Todos</option><option value="entrada">Entradas</option><option value="saida">Saídas</option></select>
            <select id="filtro-categoria" onchange="filtrarExtrato()"><option value="">Todas categorias</option></select>
        </div>
        <div id="lista-extrato" class="modal-list"></div>
        <div class="modal-footer"><p id="total-extrato"></p></div>
    </div>
</div>

<div id="modal-contas" class="modal">
    <div class="modal-content">
        <div class="modal-head"><h3>Nova Conta</h3><button onclick="fecharModal('modal-contas')"><i class="fas fa-times"></i></button></div>
        <div class="modal-body">
            <div id="lista-contas-temp" class="list-temp"></div>
            <input type="text" id="conta-nome" placeholder="Nome - Ex: Nubank">
            <input type="number" id="conta-saldo" placeholder="Saldo inicial" step="0.01">
            <button onclick="addTempConta()" class="btn-add">+ Adicionar</button>
            <button onclick="salvarContas()" class="btn-save">Salvar</button>
        </div>
    </div>
</div>

<div id="modal-graficos" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="grafico-titulo">Análise</h3>
            <button onclick="fecharModal('modal-graficos')"><i class="fas fa-times"></i></button>
        </div>
        <div class="grafico-resumo">
            <p class="grafico-label">Total do período</p>
            <p class="grafico-total" id="grafico-total">R$ 0,00</p>
        </div>
        <div class="grafico-tabs">
            <button onclick="trocarGrafico('categoria')" class="tab-active">Categorias</button>
            <button onclick="trocarGrafico('cartao')">Cartões</button>
            <button onclick="trocarGrafico('conta')">Contas</button>
            <button onclick="trocarGrafico('evolucao')">Evolução</button>
        </div>
        <div style="height: 250px; margin: 16px 0;">
            <canvas id="grafico"></canvas>
        </div>
        <div id="grafico-lista" class="grafico-lista"></div>
    </div>
</div>

<div id="modal-cartao" class="modal">
    <div class="modal-content">
        <div class="modal-head"><h3>Novo Cartão</h3><button onclick="fecharModal('modal-cartao')"><i class="fas fa-times"></i></button></div>
        <div class="modal-body">
            <div id="lista-cartoes-temp" class="list-temp"></div>
            <input type="text" id="cartao-nome" placeholder="Nome - Ex: Nubank">
            <input type="number" id="cartao-limite" placeholder="Limite - Ex: 5000">
            <input type="number" id="cartao-fechamento" placeholder="Dia fechamento" min="1" max="31">
            <input type="number" id="cartao-vencimento" placeholder="Dia vencimento" min="1" max="31">
            <button onclick="addTempCartao()" class="btn-add">+ Adicionar</button>
            <button onclick="salvarCartoes()" class="btn-save">Salvar</button>
        </div>
    </div>
</div>

<div id="modal-editar" class="modal">
    <div class="modal-content">
        <div class="modal-head"><h3>Editar</h3><button onclick="fecharModal('modal-editar')"><i class="fas fa-times"></i></button></div>
        <div class="modal-body">
            <div class="form-group"><label>Descrição</label><input type="text" id="edit-desc"></div>
            <div class="form-group"><label>Valor</label><input type="number" id="edit-valor" step="0.01"></div>
            <div class="form-group"><label>Data</label><input type="date" id="edit-data"></div>
            <div class="form-group"><label>Tipo</label><select id="edit-tipo" onchange="atualizarCategorias()"><option value="entrada">Entrada</option><option value="saida">Saída</option></select></div>
            <div class="form-group"><label>Método</label><select id="edit-metodo" onchange="atualizarContasModal()"><option value="conta">Conta</option><option value="cartao">Cartão</option></select></div>
            <div class="form-group"><label>Categoria</label><select id="edit-categoria"></select></div>
            <div class="form-group"><label>Banco/Cartão</label><select id="edit-banco"></select></div>
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="edit-conta-fixa">
                    <span>Conta Fixa</span>
                </label>
            </div>
            <div class="modal-actions">
                <button onclick="deletarTransacao()" class="btn-delete">Excluir</button>
                <button onclick="salvarEdicao()" class="btn-save">Salvar</button>
            </div>
        </div>
    </div>
</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registrado:', reg))
      .catch(err => console.log('SW erro:', err));
  });
}
</script>
<script src="script.js"></script>
</body>
</html>
