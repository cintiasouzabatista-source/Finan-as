<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BankDay</title>

    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon-192x192.png">
    <link rel="icon" href="./favicon.png" type="image/png">
    <link rel="icon" href="data:,">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<div id="tela-pin" class="tela-full">
    <div class="pin-box">
        <div class="pin-icon">
            <i class="fas fa-lock"></i>
        </div>

        <h2>Digite seu PIN</h2>

        <div id="form-pin">
            <div class="pin-inputs">
                <input type="password" maxlength="1" class="pin-input" inputmode="numeric">
                <input type="password" maxlength="1" class="pin-input" inputmode="numeric">
                <input type="password" maxlength="1" class="pin-input" inputmode="numeric">
                <input type="password" maxlength="1" class="pin-input" inputmode="numeric">
            </div>
            <button onclick="verificarPin()" class="btn-primary" style="margin-top: 20px; width: 100%;">Acessar</button>
        </div>
    </div>
</div>

<div id="app-container" class="hidden">
    <header>
        <div class="header-top">
            <div class="user-info">
                <span class="welcome">Olá,</span>
                <span class="username" id="header-user">Rafa</span>
            </div>
            <button onclick="toggleOcultarValores()" id="btn-olho">
                <i class="fas fa-eye"></i>
            </button>
        </div>
        
        <div class="balance-grid">
            <div class="balance-card">
                <span class="card-label">Saldo Geral</span>
                <h2 id="saldo-geral" class="card-value">R$ 0,00</h2>
            </div>
            <div class="balance-card">
                <span class="card-label">Entradas</span>
                <h2 id="total-entradas" class="card-value status-entrada">R$ 0,00</h2>
            </div>
            <div class="balance-card">
                <span class="card-label">Saídas</span>
                <h2 id="total-saidas" class="card-value status-saida">R$ 0,00</h2>
            </div>
            <div class="balance-card">
                <span class="card-label">Fatura Cartão</span>
                <h2 id="total-faturas" class="card-value status-fatura">R$ 0,00</h2>
            </div>
        </div>
    </header>

    <main>
        <div id="chat-box" class="chat-container">
            </div>
    </main>

    <div class="input-bar-container">
        <div class="input-bar">
            <input type="text" id="input-comando" placeholder="Digite ou fale: 'Almoço 35 no Itaú'...">
            <button id="btn-voz" onclick="iniciarVoz()">
                <i class="fas fa-microphone"></i>
            </button>
            <button id="btn-enviar" onclick="processarComando()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="trocarAba('chat', event)">
            <i class="fas fa-comment-alt"></i>
            <span>Chat</span>
        </button>

        <button class="nav-item" onclick="abrirModal('modal-extrato')">
            <i class="fas fa-list-ul"></i>
            <span>Extrato</span>
        </button>

        <button class="nav-item" onclick="abrirGraficos()">
            <i class="fas fa-chart-bar"></i>
            <span>Gráficos</span>
        </button>

        <button class="nav-item" onclick="toggleMenuMais()">
            <i class="fas fa-ellipsis-h"></i>
            <span>Mais</span>
        </button>
    </nav>
</div>

<div id="menu-mais" class="menu-mais hidden">
    <div class="menu-mais-content">
        <button onclick="abrirModal('modal-contas'); fecharMenuMais()">
            <i class="fas fa-university"></i>
            <span>Contas</span>
        </button>

        <button onclick="abrirModal('modal-cartao'); fecharMenuMais()">
            <i class="fas fa-credit-card"></i>
            <span>Cartões</span>
        </button>

        <button onclick="toggleProjetado(); fecharMenuMais()">
            <i class="fas fa-chart-line"></i>
            <span>Projeção</span>
        </button>

        <button onclick="resetarTransacoes(); fecharMenuMais()">
            <i class="fas fa-eraser"></i>
            <span>Limpar Mês</span>
        </button>

        <button onclick="resetarApp()">
            <i class="fas fa-trash"></i>
            <span>Resetar App</span>
        </button>
    </div>
</div>

<div id="modal-extrato" class="modal">
    <div class="modal-content">
        <div class="modal-head">
            <h3>Extrato</h3>
            <button onclick="fecharModal('modal-extrato')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-filters">
            <select id="filtro-tipo" onchange="filtrarExtrato()">
                <option value="">Todos os tipos</option>
                <option value="entrada">Entradas</option>
                <option value="saida">Saídas</option>
                <option value="cartao">Cartão de Crédito</option>
            </select>
            <select id="filtro-categoria" onchange="filtrarExtrato()">
                <option value="">Todas categorias</option>
            </select>
        </div>
        <div id="lista-extrato" class="modal-body">
            </div>
        <div class="modal-footer">
            <h4 id="total-extrato">Total: R$ 0,00</h4>
        </div>
    </div>
</div>

<div id="modal-graficos" class="modal">
    <div class="modal-content">
        <div class="modal-head">
            <h3>Análise de Gastos</h3>
            <button onclick="fecharModal('modal-graficos')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <div class="grafico-resumo">
                <p id="grafico-titulo" class="grafico-label">Gastos por Categoria</p>
                <p id="grafico-total" class="grafico-total">R$ 0,00</p>
            </div>
            <div class="grafico-tabs">
                <button class="tab-active" onclick="trocarGrafico('categoria', event)">Categorias</button>
                <button onclick="trocarGrafico('conta', event)">Contas</button>
                <button onclick="trocarGrafico('cartao', event)">Cartões</button>
                <button onclick="trocarGrafico('evolucao', event)">Evolução</button>
            </div>
            <div style="position: relative; height: 200px; margin-bottom: 20px;">
                <canvas id="grafico"></canvas>
            </div>
            <div id="grafico-lista" class="grafico-lista">
                </div>
        </div>
    </div>
</div>

<div id="modal-contas" class="modal">
    <div class="modal-content">
        <div class="modal-head">
            <h3>Gerenciar Contas</h3>
            <button onclick="fecharModal('modal-contas')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Nome da Conta</label>
                <input type="text" id="conta-nome" placeholder="Ex: Nubank, Carteira">
            </div>
            <div class="form-group">
                <label>Saldo Inicial</label>
                <input type="number" id="conta-saldo" step="0.01" placeholder="0.00">
            </div>
            <button onclick="addTempConta()" class="btn-add">Adicionar Conta</button>
            <hr style="margin: 16px 0; border-color: var(--border);">
            <div id="lista-contas-temp" class="list-temp"></div>
            <button onclick="salvarContas()" class="btn-save">Salvar e Concluir</button>
        </div>
    </div>
</div>

<div id="modal-cartao" class="modal">
    <div class="modal-content">
        <div class="modal-head">
            <h3>Gerenciar Cartões</h3>
            <button onclick="fecharModal('modal-cartao')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Nome do Cartão</label>
                <input type="text" id="cartao-nome" placeholder="Ex: Inter Black">
            </div>
            <div class="form-group">
                <label>Limite</label>
                <input type="number" id="cartao-limite" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group" style="display: flex; gap: 8px;">
                <div style="flex: 1;">
                    <label>Fechamento (Dia)</label>
                    <input type="number" id="cartao-fechamento" min="1" max="31">
                </div>
                <div style="flex: 1;">
                    <label>Vencimento (Dia)</label>
                    <input type="number" id="cartao-vencimento" min="1" max="31">
                </div>
            </div>
            <button onclick="addTempCartao()" class="btn-add">Adicionar Cartão</button>
            <hr style="margin: 16px 0; border-color: var(--border);">
            <div id="lista-cartoes-temp" class="list-temp"></div>
            <button onclick="salvarCartoes()" class="btn-save">Salvar e Concluir</button>
        </div>
    </div>
</div>

<div id="modal-editar" class="modal">
    <div class="modal-content">
        <div class="modal-head">
            <h3>Editar Lançamento</h3>
            <button onclick="fecharModal('modal-editar')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Descrição</label>
                <input type="text" id="edit-desc">
            </div>
            <div class="form-group">
                <label>Valor</label>
                <input type="number" id="edit-valor" step="0.01">
            </div>
            <div class="form-group">
                <label>Data</label>
                <input type="date" id="edit-data">
            </div>
            <div class="form-group">
                <label>Tipo</label>
                <select id="edit-tipo" onchange="atualizarCategorias()">
                    <option value="entrada">Entrada</option>
                    <option value="saida">Saída</option>
                </select>
            </div>
            <div class="form-group">
                <label>Forma de Pagamento</label>
                <select id="edit-metodo" onchange="atualizarContasModal()">
                    <option value="conta">Conta (Saldo)</option>
                    <option value="cartao">Cartão de Crédito</option>
                </select>
            </div>
            <div class="form-group">
                <label>Origem / Destino</label>
                <select id="edit-banco"></select>
            </div>
            <div class="form-group">
                <label>Categoria</label>
                <select id="edit-categoria"></select>
            </div>
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="edit-conta-fixa">
                    <span>Conta Fixa (Repetir todo mês)</span>
                </label>
            </div>
            <div class="modal-actions">
                <button onclick="deletarTransacao()" class="btn-delete"><i class="fas fa-trash"></i> Excluir</button>
                <button onclick="salvarEdicao()" class="btn-save">Salvar Alterações</button>
            </div>
        </div>
    </div>
</div>

<script>
window.onerror = function(msg, src, line, col) {
    alert(
        'ERRO:\\n' +
        msg + '\\n' +
        'Linha: ' + line + '\\n' +
        'Coluna: ' + col
    );
};
</script>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('SW Registrado com sucesso!', reg.scope))
            .catch(err => console.log('Falha ao registrar o SW:', err));
    });
}
</script>
<script src="script.js"></script>

</body>
</html>
